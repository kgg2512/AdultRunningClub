<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Adult Running Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0908;
      --bg2: #130F0C;
      --gold: #C9A84C;
      --gold-line: rgba(201,168,76,0.18);
      --ivory: #FAF8F4;
      --ivory-dim: rgba(250,248,244,0.55);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Raleway', system-ui, sans-serif;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ivory);
      font-family: var(--sans);
      font-weight: 300;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(201,168,76,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .eyebrow {
      font-family: var(--sans);
      font-size: 0.44rem;
      letter-spacing: 0.7em;
      color: var(--gold);
      opacity: 0.6;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .badge {
      width: 60px;
      height: 60px;
      border: 1px solid var(--gold-line);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      background: rgba(201,168,76,0.05);
      position: relative;
    }
    .badge::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.08);
    }
    .badge-text {
      font-family: var(--serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 0.06em;
    }
    .ornament {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .ornament-line {
      flex: 1;
      max-width: 48px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-line));
    }
    .ornament-line.r { background: linear-gradient(to left, transparent, var(--gold-line)); }
    .ornament-diamond {
      width: 4px;
      height: 4px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.45;
    }
    .title {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.15;
      color: var(--ivory);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }
    .subtitle {
      font-family: var(--sans);
      font-size: 0.52rem;
      font-weight: 200;
      letter-spacing: 0.5em;
      color: var(--gold);
      opacity: 0.65;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .message {
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 2.2;
      color: var(--ivory-dim);
      max-width: 290px;
      margin: 0 auto 16px;
    }
    .message-ko {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 300;
      line-height: 2;
      color: var(--ivory-dim);
      max-width: 290px;
      margin: 0 auto 40px;
      letter-spacing: 0.03em;
    }
    .btn {
      display: inline-block;
      padding: 17px 40px;
      background: transparent;
      border: 1px solid var(--gold-line);
      color: var(--ivory-dim);
      font-family: var(--sans);
      font-size: 0.56rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.4rem;
      letter-spacing: 0.28em;
      color: rgba(250,248,244,0.15);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="eyebrow">Adult Running Club</div>
  <div class="badge"><span class="badge-text">ARC</span></div>
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line r"></div>
  </div>
  <h1 class="title">You're offline.</h1>
  <div class="subtitle">The run continues</div>
  <p class="message">You're offline. The run continues when you reconnect.</p>
  <p class="message-ko">오프라인 상태입니다.<br>연결이 복구되면 달리기는 계속됩니다.</p>
  <a class="btn" href="/AdultRunningClub/">Return to ARC</a>
  <div class="footer">Seoul · Tokyo · New York · London · Paris · Sydney</div>
</body>
</html>
